version: 1.3.13
cache: true

interface:
  customWelcome: 'Fira Research'
  modelSelect: true
  parameters: true
  presets: false
  prompts:
    use: false
  bookmarks: true
  multiConvo: true
  agents:
    use: true
  marketplace:
    use: false
  fileCitations: true
  defaultPinnedTools:
    - 'mcp'
  mcpServers:
    use: true
    create: false
    share: false
    public: false

endpoints:
  agents:
    disableBuilder: true
    allowedProviders:
      - 'openAI'
    capabilities:
      - 'tools'
      - 'actions'
    toolApproval:
      enabled: false
      mode: 'bypass'
  openAI:
    models:
      default:
        - 'fira-lora'
      fetch: false
    titleConvo: false
    summarize: false
    modelDisplayLabel: 'Qwen 3.5-35B (Fira)'
    tokenConfig:
      fira-lora:
        prompt: 0
        completion: 0
        context: 262144
    addParams:
      chat_template_kwargs:
        enable_thinking: false

modelSpecs:
  list:
    - name: 'fira-lora'
      label: 'Qwen 3.5-35B (Fira)'
      default: true
      group: 'fira'
      mcpServers:
        - 'Fira-MCP'
      preset:
        endpoint: 'openAI'
        endpointType: 'agents'
        agent_id: 'ephemeral'
        model: 'fira-lora'
        temperature: 0
        max_tokens: 8192
        maxContextTokens: 240000

mcpServers:
  Fira-MCP:
    type: streamable-http
    url: 'https://tools-dev.firaresearch.com/mcp?token=${FIRA_MCP_EVALS_TOKEN}'
    serverInstructions: true
    timeout: 300000
