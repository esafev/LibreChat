version: 1.3.13
cache: true

interface:
  customWelcome: 'Fira Research'
  modelSelect: true
  parameters: true
  presets: false
  prompts:
    use: false
  bookmarks: true
  multiConvo: true
  agents:
    use: false
  marketplace:
    use: false
  fileCitations: true
  defaultPinnedTools:
    - 'mcp'
  mcpServers:
    use: true
    create: false
    share: false
    public: false

endpoints:
  custom:
    - name: 'fira'
      apiKey: 'dummy'
      baseURL: 'http://95.133.253.125:8001/v1'
      models:
        default:
          - 'fira-lora'
        fetch: false
      titleConvo: false
      summarize: false
      modelDisplayLabel: 'Qwen 3.5-35B (Fira)'
      addParams:
        chat_template_kwargs:
          enable_thinking: false

modelSpecs:
  list:
    - name: 'fira-lora'
      label: 'Qwen 3.5-35B (Fira)'
      default: true
      group: 'fira'
      preset:
        endpoint: 'fira'
        model: 'fira-lora'
        temperature: 0
        max_tokens: 8192

mcpServers:
  Fira MCP:
    type: streamable-http
    url: 'https://tools-dev.firaresearch.com/mcp'
    apiKey:
      source: 'admin'
      authorization_type: 'bearer'
      key: '${FIRA_MCP_EVALS_TOKEN}'
    serverInstructions: true
    timeout: 300000
